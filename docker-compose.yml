services:
  # ============================================
  # PHP-FPM + Laravel Application
  # ============================================
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    container_name: hexagonal_academy_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - hexagonal_network
    depends_on:
      - postgres
      - redis
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-hexagonal_academy}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  # ============================================
  # Nginx Web Server
  # ============================================
  nginx:
    image: nginx:1.25-alpine
    container_name: hexagonal_academy_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - hexagonal_network
    depends_on:
      - app

  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: hexagonal_academy_postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-hexagonal_academy}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - hexagonal_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis Cache & Queue
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: hexagonal_academy_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - hexagonal_network
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-null}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============================================
  # Queue Worker (Laravel)
  # ============================================
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    container_name: hexagonal_academy_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - hexagonal_network
    depends_on:
      - app
      - redis
      - postgres
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600

  # ============================================
  # Scheduler (Laravel Cron)
  # ============================================
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    container_name: hexagonal_academy_scheduler
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - hexagonal_network
    depends_on:
      - app
      - redis
      - postgres
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"

  # ============================================
  # Mailhog (Email Testing)
  # ============================================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: hexagonal_academy_mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_PORT:-8025}:8025"  # Web UI
      - "${MAILHOG_SMTP_PORT:-1025}:1025"  # SMTP
    networks:
      - hexagonal_network

  # ============================================
  # pgAdmin (PostgreSQL GUI - Optional)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hexagonal_academy_pgadmin
    restart: unless-stopped
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@hexagonal-academy.test}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_ALLOW_SPECIAL_EMAIL_DOMAINS: '["test", "localhost", "local"]'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - hexagonal_network
    depends_on:
      - postgres
    profiles:
      - tools

# ============================================
# Networks
# ============================================
networks:
  hexagonal_network:
    driver: bridge

# ============================================
# Volumes (Persistent Data)
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local
